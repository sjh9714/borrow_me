services:
  mysql:
    image: mysql:8.0
    container_name: borrowme-k6-mysql
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: shop
    ports:
      - "3306:3306"
    volumes:
      - borrowme-k6-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot --silent"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  borrowme-k6-mysql:
