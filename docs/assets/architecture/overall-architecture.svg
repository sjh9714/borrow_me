<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">BorrowMe overall architecture</title>
  <desc id="desc">Simplified README architecture showing the candidate-owned product listing, reservation consistency, notification, MySQL, and Testcontainers verification boundaries.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155" />
    </marker>
    <marker id="test-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7c3aed" />
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .boundary { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.8; }
      .api { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; }
      .security { fill: #fffbeb; stroke: #d97706; stroke-width: 2; }
      .service { fill: #ecfdf5; stroke: #059669; stroke-width: 2; }
      .data { fill: #f1f5f9; stroke: #475569; stroke-width: 2; }
      .test { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; stroke-dasharray: 8 6; }
      .noteBox { fill: #ffffff; stroke: #d0d5dd; stroke-width: 1.2; }
      .labelBg { fill: #f8fafc; }
      .link { fill: none; stroke: #334155; stroke-width: 2.2; }
      .arrow { fill: none; stroke: #334155; stroke-width: 2.2; marker-end: url(#arrow); }
      .testArrow { fill: none; stroke: #7c3aed; stroke-width: 2; stroke-dasharray: 7 6; marker-end: url(#test-arrow); }
      .heading { font-family: Arial, Helvetica, sans-serif; font-size: 26px; fill: #0f172a; font-weight: 700; }
      .sub { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #475569; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #0f172a; font-weight: 700; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #334155; }
      .tiny { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #475569; }
      .zone { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #64748b; font-weight: 700; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="760" />
  <text class="heading" x="56" y="54">BorrowMe 전체 아키텍처</text>
  <text class="sub" x="56" y="82">후보자 담당 범위 중심: 상품 목록 조회, 예약 정합성, 알림 흐름, MySQL 검증 경계</text>

  <rect class="api" x="56" y="332" width="160" height="76" rx="8" />
  <text class="label" x="136" y="364" text-anchor="middle">Client</text>
  <text class="small" x="136" y="388" text-anchor="middle">REST 요청/응답</text>

  <rect class="boundary" x="280" y="126" width="630" height="500" rx="14" />
  <text class="zone" x="304" y="158">Spring Boot API boundary</text>
  <text class="tiny" x="304" y="180">controller → service → repository 흐름</text>

  <rect class="security" x="500" y="210" width="190" height="72" rx="8" />
  <text class="label" x="595" y="240" text-anchor="middle">Auth / Security</text>
  <text class="small" x="595" y="264" text-anchor="middle">JWT, Spring Security</text>

  <rect class="api" x="330" y="340" width="160" height="72" rx="8" />
  <text class="label" x="410" y="370" text-anchor="middle">Product API</text>
  <text class="small" x="410" y="394" text-anchor="middle">목록 / 검색 / 상세</text>

  <rect class="api" x="515" y="340" width="170" height="72" rx="8" />
  <text class="label" x="600" y="370" text-anchor="middle">Reservation API</text>
  <text class="small" x="600" y="394" text-anchor="middle">예약 / 취소</text>

  <rect class="api" x="710" y="340" width="150" height="72" rx="8" />
  <text class="label" x="785" y="366" text-anchor="middle">Notification</text>
  <text class="label" x="785" y="390" text-anchor="middle">API</text>

  <rect class="service" x="330" y="492" width="160" height="82" rx="8" />
  <text class="label" x="410" y="524" text-anchor="middle">Product Service</text>
  <text class="small" x="410" y="548" text-anchor="middle">N+1 query guard</text>

  <rect class="service" x="515" y="492" width="170" height="82" rx="8" />
  <text class="label" x="600" y="524" text-anchor="middle">Reservation</text>
  <text class="label" x="600" y="548" text-anchor="middle">Service</text>
  <text class="small" x="600" y="570" text-anchor="middle">Pessimistic Lock</text>

  <rect class="service" x="710" y="492" width="150" height="82" rx="8" />
  <text class="label" x="785" y="518" text-anchor="middle">Notification</text>
  <text class="label" x="785" y="542" text-anchor="middle">Service</text>
  <text class="small" x="785" y="564" text-anchor="middle">댓글 / 팔로우 알림</text>

  <rect class="data" x="974" y="314" width="170" height="96" rx="8" />
  <text class="label" x="1059" y="352" text-anchor="middle">MySQL</text>
  <text class="small" x="1059" y="378" text-anchor="middle">상품 / 예약 / 알림</text>

  <rect class="test" x="974" y="492" width="170" height="96" rx="8" />
  <text class="label" x="1059" y="528" text-anchor="middle">Testcontainers</text>
  <text class="label" x="1059" y="552" text-anchor="middle">MySQL</text>
  <text class="small" x="1059" y="576" text-anchor="middle">query / concurrency 검증</text>

  <path class="arrow" d="M216 370 H330" />
  <path class="arrow" d="M595 282 V340" />
  <path class="arrow" d="M410 412 V492" />
  <path class="arrow" d="M600 412 V492" />
  <path class="arrow" d="M785 412 V492" />
  <path class="link" d="M410 574 V610 M600 574 V610 M785 574 V610 M410 610 H930" />
  <path class="arrow" d="M930 610 V362 H974" />
  <rect class="labelBg" x="502" y="584" width="240" height="24" rx="4" />
  <text class="tiny" x="622" y="600" text-anchor="middle">repository / JPA data access</text>
  <path class="testArrow" d="M1059 492 V410" />

  <rect class="noteBox" x="56" y="650" width="1088" height="62" rx="8" />
  <text class="small" x="80" y="676">단순화된 README 구조도입니다. 운영 배포 토폴로지나 production SLO를 주장하지 않습니다.</text>
  <text class="small" x="80" y="700">상품 목록 성능 claim은 README의 원본 기록과 현재 local snapshot / query-count guard 경계를 분리해 설명합니다.</text>
</svg>
