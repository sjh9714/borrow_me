<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="760" viewBox="0 0 1160 760" role="img" aria-labelledby="title desc">
  <title id="title">BorrowMe overall architecture</title>
  <desc id="desc">Simplified architecture showing client, Spring Boot API, auth and security, product, reservation, notification APIs and services, MySQL, and Testcontainers MySQL.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155" />
    </marker>
    <marker id="test-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b" />
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .boundary { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
      .api { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; }
      .security { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
      .service { fill: #ecfdf5; stroke: #059669; stroke-width: 2; }
      .data { fill: #f1f5f9; stroke: #475569; stroke-width: 2; }
      .test { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; stroke-dasharray: 8 6; }
      .arrow { fill: none; stroke: #334155; stroke-width: 2.5; marker-end: url(#arrow); }
      .testArrow { fill: none; stroke: #64748b; stroke-width: 2.5; stroke-dasharray: 7 6; marker-end: url(#test-arrow); }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #0f172a; font-weight: 700; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #334155; }
      .note { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #475569; }
      .heading { font-family: Arial, Helvetica, sans-serif; font-size: 24px; fill: #0f172a; font-weight: 700; }
    </style>
  </defs>

  <rect class="bg" width="1160" height="760" />
  <text class="heading" x="56" y="50">BorrowMe 전체 아키텍처</text>
  <text class="small" x="56" y="78">후보자 담당 범위 중심: 상품 목록 조회, 예약 정합성, 알림 흐름</text>

  <rect class="api" x="56" y="330" width="170" height="80" rx="6" />
  <text class="label" x="106" y="365">Client</text>
  <text class="small" x="82" y="390">REST 요청/응답</text>

  <rect class="boundary" x="286" y="118" width="550" height="504" rx="8" />
  <text class="label" x="312" y="150">Spring Boot API</text>
  <text class="note" x="312" y="174">controller -> service -> repository 흐름</text>

  <rect class="security" x="326" y="210" width="180" height="84" rx="6" />
  <text class="label" x="354" y="246">Auth / Security</text>
  <text class="small" x="368" y="272">JWT, Spring Security</text>

  <rect class="api" x="326" y="340" width="160" height="72" rx="6" />
  <text class="label" x="358" y="371">Product API</text>
  <text class="small" x="356" y="394">목록/검색/상세</text>

  <rect class="api" x="496" y="340" width="170" height="72" rx="6" />
  <text class="label" x="518" y="371">Reservation API</text>
  <text class="small" x="536" y="394">예약/취소</text>

  <rect class="api" x="676" y="340" width="130" height="72" rx="6" />
  <text class="label" x="704" y="365">Notification</text>
  <text class="label" x="730" y="388">API</text>

  <rect class="service" x="326" y="482" width="160" height="74" rx="6" />
  <text class="label" x="350" y="514">Product Service</text>
  <text class="small" x="354" y="538">N+1 query guard</text>

  <rect class="service" x="496" y="482" width="170" height="74" rx="6" />
  <text class="label" x="512" y="514">Reservation Service</text>
  <text class="small" x="514" y="538">Pessimistic Lock</text>

  <rect class="service" x="676" y="482" width="130" height="74" rx="6" />
  <text class="label" x="704" y="506">Notification</text>
  <text class="label" x="714" y="530">Service</text>
  <text class="small" x="700" y="550">댓글/팔로우 알림</text>

  <rect class="data" x="896" y="300" width="190" height="94" rx="6" />
  <text class="label" x="954" y="342">MySQL</text>
  <text class="small" x="928" y="368">상품/예약/알림 데이터</text>

  <rect class="test" x="896" y="486" width="190" height="94" rx="6" />
  <text class="label" x="916" y="528">Testcontainers MySQL</text>
  <text class="small" x="918" y="554">query/concurrency 검증</text>

  <path class="arrow" d="M226 370 L326 370" />
  <path class="arrow" d="M416 294 L416 340" />
  <path class="arrow" d="M486 376 L496 376" />
  <path class="arrow" d="M666 376 L676 376" />
  <path class="arrow" d="M406 412 L406 482" />
  <path class="arrow" d="M581 412 L581 482" />
  <path class="arrow" d="M741 412 L741 482" />

  <path class="arrow" d="M486 519 C610 598, 752 600, 896 365" />
  <path class="arrow" d="M666 519 C748 548, 826 512, 896 370" />
  <path class="arrow" d="M806 519 C860 490, 882 438, 896 376" />
  <path class="arrow" d="M806 376 L896 348" />

  <path class="testArrow" d="M990 486 L990 394" />
  <path class="testArrow" d="M896 533 C784 638, 456 650, 406 556" />
  <path class="testArrow" d="M896 533 C790 672, 590 666, 581 556" />

  <text class="note" x="350" y="632">단순화된 구조도: 구현된 핵심 흐름과 검증 대상 경계를 설명합니다.</text>
  <text class="note" x="350" y="654">운영 배포 토폴로지나 production SLO를 주장하지 않습니다.</text>
</svg>
