name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Check whitespace
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1000
            if git merge-base "origin/${{ github.base_ref }}" HEAD >/dev/null; then
              git diff --check "origin/${{ github.base_ref }}...HEAD"
            else
              echo "No merge base found; checking latest commit for whitespace."
              git diff-tree --check --no-commit-id -r HEAD
            fi
          else
            git diff-tree --check --no-commit-id --root -r HEAD
          fi
      - name: Check source line layout
        run: |
          python3 - <<'PY'
          from pathlib import Path

          targets = (
              list(Path("src").rglob("*.java"))
              + list(Path(".github").rglob("*.yml"))
              + list(Path(".github").rglob("*.yaml"))
              + list(Path("k6").rglob("*.js"))
              + [Path("README.md")]
          )

          bad = []
          for path in targets:
              if not path.exists():
                  continue
              lines = path.read_text(encoding="utf-8", errors="ignore").splitlines()
              if len(lines) <= 3:
                  bad.append((str(path), len(lines)))

          if bad:
              print("Potential collapsed files:")
              for row in bad:
                  print(row)
              raise SystemExit(1)

          print(f"OK: checked {len(targets)} files")
          PY
      - name: Check k6 script syntax
        run: |
          node --check k6/helpers.js
          node --check k6/test-product-listing.js
          node --check k6/test-search.js
          node --check k6/test-concurrent-reserve.js
      - name: Inspect k6 scripts
        run: |
          docker run --rm -i -v "$PWD:/work" -w /work grafana/k6 inspect k6/test-product-listing.js >/dev/null
          docker run --rm -i -v "$PWD:/work" -w /work grafana/k6 inspect k6/test-search.js >/dev/null
          docker run --rm -i -v "$PWD:/work" -w /work grafana/k6 inspect k6/test-concurrent-reserve.js >/dev/null
      - name: Check architecture docs
        run: |
          python3 - <<'PY'
          from pathlib import Path

          readme = Path("README.md").read_text(encoding="utf-8")
          required_readme = [
              "## 전체 아키텍처",
              "![BorrowMe 전체 아키텍처](docs/assets/architecture/overall-architecture.svg)",
              "이 다이어그램은 구현된 핵심 흐름과 검증 대상 경계를 설명하기 위한 단순화된 구조도이며, 운영 배포 토폴로지나 production SLO를 주장하지 않습니다.",
          ]
          missing = [item for item in required_readme if item not in readme]
          if missing:
              print("README architecture section is missing required text:")
              for item in missing:
                  print(f"- {item}")
              raise SystemExit(1)

          asset_dir = Path("docs/assets/architecture")
          required_assets = [
              asset_dir / "overall-architecture.svg",
              asset_dir / "overall-architecture.drawio",
          ]
          absent = [str(path) for path in required_assets if not path.exists()]
          if absent:
              print("Missing architecture assets:")
              for path in absent:
                  print(f"- {path}")
              raise SystemExit(1)

          banned = [
              path
              for path in asset_dir.rglob("*")
              if path.is_file()
              and path.suffix.lower() in {".png", ".jpg", ".jpeg", ".webp"}
          ]
          if banned:
              print("Architecture assets must remain SVG/drawio only:")
              for path in banned:
                  print(f"- {path}")
              raise SystemExit(1)

          print("OK: architecture docs checked")
          PY
      - name: Test
        run: ./gradlew test --no-daemon
      - name: Build
        run: ./gradlew build --no-daemon
