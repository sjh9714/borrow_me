name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Check whitespace
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1000
            if git merge-base "origin/${{ github.base_ref }}" HEAD >/dev/null; then
              git diff --check "origin/${{ github.base_ref }}...HEAD"
            else
              echo "No merge base found; checking latest commit for whitespace."
              git diff-tree --check --no-commit-id -r HEAD
            fi
          else
            git diff-tree --check --no-commit-id --root -r HEAD
          fi
      - name: Check source line layout
        run: |
          python3 - <<'PY'
          from pathlib import Path

          targets = (
              list(Path("src").rglob("*.java"))
              + list(Path(".github").rglob("*.yml"))
              + list(Path(".github").rglob("*.yaml"))
              + list(Path("k6").rglob("*.js"))
              + [Path("README.md")]
          )

          bad = []
          for path in targets:
              if not path.exists():
                  continue
              lines = path.read_text(encoding="utf-8", errors="ignore").splitlines()
              if len(lines) <= 3:
                  bad.append((str(path), len(lines)))

          if bad:
              print("Potential collapsed files:")
              for row in bad:
                  print(row)
              raise SystemExit(1)

          print(f"OK: checked {len(targets)} files")
          PY
      - name: Check k6 script syntax
        run: |
          node --check k6/helpers.js
          node --check k6/test-product-listing.js
          node --check k6/test-search.js
          node --check k6/test-concurrent-reserve.js
      - name: Inspect k6 scripts
        run: |
          docker run --rm -i -v "$PWD:/work" -w /work grafana/k6 inspect k6/test-product-listing.js >/dev/null
          docker run --rm -i -v "$PWD:/work" -w /work grafana/k6 inspect k6/test-search.js >/dev/null
          docker run --rm -i -v "$PWD:/work" -w /work grafana/k6 inspect k6/test-concurrent-reserve.js >/dev/null
      - name: Test
        run: ./gradlew test --no-daemon
      - name: Build
        run: ./gradlew build --no-daemon
